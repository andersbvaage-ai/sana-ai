name: Build & Deploy to AWS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sana-ai
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Elastic Beanstalk
        env:
          EB_APP: sana-ai
          EB_ENV: sana-ai-prod
          BUCKET: elasticbeanstalk-eu-north-1-480437358794
          REGION: eu-north-1
        run: |
          VERSION="deploy-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          aws s3 cp Dockerrun.aws.json s3://$BUCKET/$VERSION/Dockerrun.aws.json
          aws elasticbeanstalk create-application-version \
            --application-name $EB_APP \
            --version-label $VERSION \
            --source-bundle S3Bucket=$BUCKET,S3Key=$VERSION/Dockerrun.aws.json \
            --region $REGION
          aws elasticbeanstalk update-environment \
            --application-name $EB_APP \
            --environment-name $EB_ENV \
            --version-label $VERSION \
            --region $REGION
          echo "Deployer versjon: $VERSION"
