<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logg inn – Sana AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fjord:    #1B3A4B;
      --fjord-2:  #243F52;
      --gold:     #B8935A;
      --gold-lt:  #F5ECD9;
      --cream:    #FAF8F4;
      --border:   #E5E0D8;
      --ink:      #1A1A1A;
      --ink-2:    #374151;
      --muted:    #6B7280;
      --red:      #991B1B;
      --red-lt:   #FEE2E2;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--fjord);
      background-image:
        radial-gradient(ellipse at 60% 0%, rgba(184,147,90,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 0% 100%, rgba(255,255,255,0.04) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .login-card {
      background: var(--cream);
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 8px 24px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-header {
      padding: 32px 32px 26px;
      background: var(--fjord-2);
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 22px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(184,147,90,0.18);
      border: 1px solid rgba(184,147,90,0.4);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }
    .logo-text em { color: var(--gold); font-style: italic; }

    .card-subtitle {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
    }

    .card-body {
      padding: 28px 32px 32px;
    }

    .card-body h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.3px;
      margin-bottom: 22px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--ink);
      background: white;
      transition: all 0.15s;
      outline: none;
    }
    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,147,90,0.14);
    }

    #error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--red);
      background: var(--red-lt);
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    #error-msg.visible { display: flex; }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--fjord);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      letter-spacing: 0.1px;
    }
    .btn-login:hover:not(:disabled) {
      background: var(--fjord-2);
      box-shadow: 0 4px 14px rgba(27,58,75,0.35);
    }
    .btn-login:disabled {
      background: #C8BFB0;
      cursor: not-allowed;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0 20px;
    }

    .demo-box {
      background: var(--gold-lt);
      border: 1px solid rgba(184,147,90,0.25);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .demo-box-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .demo-box p {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.7;
    }
    .demo-box strong {
      color: var(--ink);
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.3px;
    }
    .footer-note a {
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-note a:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <span class="logo-text">Sana<em>AI</em></span>
    </div>
    <span class="card-subtitle">Klagesak-analyse for helsesektoren</span>
  </div>

  <div class="card-body">
    <h2>Logg inn</h2>

    <div id="error-msg">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text"></span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-post</label>
        <input type="email" id="email" placeholder="din@epost.no" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Passord</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="login-btn">Logg inn</button>
    </form>

    <div class="divider"></div>

    <div class="demo-box">
      <div class="demo-box-label">Demo-tilgang</div>
      <p>
        E-post: <strong>demo@sana-ai.no</strong><br>
        Passord: <strong>demo1234</strong>
      </p>
    </div>
  </div>
</div>

<p class="footer-note">
  <a href="/">Sana AI</a> · Kun for autorisert helsepersonell
</p>

<script src="/login.js"></script>
</body>
</html>
